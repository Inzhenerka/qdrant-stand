services:
  qdrant-stand:
    build:
      context: .
      args:
        OPENAI_API_KEY: ${OPENAI_API_KEY}
    image: qdrant-stand:local
    ports:
      - "6333:6333"
    environment:
      QDRANT__SERVICE__API_KEY: ${QDRANT_API_KEY:-admin-rotate-me}
      QDRANT__SERVICE__READ_ONLY_API_KEY: ${QDRANT_READ_ONLY_API_KEY:-student}
