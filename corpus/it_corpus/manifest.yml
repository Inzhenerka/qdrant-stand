name: Корпус вводного IT-курса
description: |
  Учебные материалы для студентов вводного IT-курса.
  Шесть модулей: Python, Git, Shell, Pandas, тестирование, SQL.

documents:
  - doc_id: python_intro
    file: python-intro.md
    title: Введение в Python
    author: Inzhenerka.Tech
    source_url: https://github.com/Inzhenerka/qdrant-stand/blob/main/corpus/it_corpus/python-intro.md
    section: Python
    content_scope: |
      Введение в Python с нуля: переменные и базовые типы, коллекции,
      циклы, условия, функции, исключения, работа с файлами и путями,
      comprehension, модули, виртуальные окружения, аннотации типов.
      Сквозной сценарий — анализ клинических данных воспаления по
      пациентам (inflammation-NN.csv).

  - doc_id: git_basics
    file: git-basics.md
    title: Основы Git
    author: Inzhenerka.Tech
    source_url: https://github.com/Inzhenerka/qdrant-stand/blob/main/corpus/it_corpus/git-basics.md
    section: Git
    content_scope: |
      Введение в Git и GitHub с нуля: настройка, локальный репозиторий,
      цикл add/commit/diff, история и restore, .gitignore, удалённый
      репозиторий по SSH, совместная работа, разрешение конфликтов
      слияния. Сквозной сценарий — кулинарная книга шефа Alfredo
      Linguini в папке recipes/.

  - doc_id: shell_basics
    file: shell-basics.md
    title: Основы Unix Shell
    author: Inzhenerka.Tech
    source_url: https://github.com/Inzhenerka/qdrant-stand/blob/main/corpus/it_corpus/shell-basics.md
    section: Shell
    content_scope: |
      Введение в Unix Shell (Bash) с нуля: навигация по файловой
      системе, работа с файлами и папками, перенаправление и пайпы,
      циклы for, shell-скрипты, поиск через grep и find. Сквозной
      сценарий — морской биолог Nelle Nemo и её 1520 образцов
      с North Pacific Gyre.

  - doc_id: pandas_intro
    file: pandas-intro.md
    title: Анализ данных с pandas
    author: Inzhenerka.Tech
    source_url: https://github.com/Inzhenerka/qdrant-stand/blob/main/corpus/it_corpus/pandas-intro.md
    section: Анализ данных
    content_scope: |
      Введение в pandas для анализа табличных данных: чтение CSV,
      доступ через iloc/loc, фильтрация булевыми масками, группировка
      и агрегация, работа с пропусками, объединение таблиц, базовая
      визуализация. Сквозной сценарий — датасет Gapminder с ВВП на
      душу населения по странам и годам (gapminder_gdp_<регион>.csv).

  - doc_id: testing_basics
    file: testing-basics.md
    title: Основы автоматического тестирования с pytest
    author: Inzhenerka.Tech
    source_url: https://github.com/Inzhenerka/qdrant-stand/blob/main/corpus/it_corpus/testing-basics.md
    section: Тестирование
    content_scope: |
      Введение в автоматическое тестирование с pytest: assert
      и исключения, unit-тесты в стиле Arrange-Act-Assert, pytest
      и его возможности (parametrize, raises, approx), edge/corner
      cases, фикстуры и conftest.py, покрытие через pytest-cov,
      методологии TDD и bug-first. Сквозной пример — функция mean
      и числа Фибоначчи.

  - doc_id: sql_basics
    file: sql-basics.md
    title: Основы SQL и реляционных БД
    author: Inzhenerka.Tech
    source_url: https://github.com/Inzhenerka/qdrant-stand/blob/main/corpus/it_corpus/sql-basics.md
    section: Базы данных
    content_scope: |
      Введение в SQL и реляционные БД на примере SQLite: SELECT/WHERE/
      ORDER BY, NULL, агрегация и GROUP BY/HAVING, JOIN, INSERT/UPDATE/
      DELETE, CREATE TABLE с ограничениями, индексы и транзакции,
      работа из Python через sqlite3 (включая параметризацию против
      SQL-инъекций). Сквозной сценарий — антарктические научные
      экспедиции (таблицы Person, Site, Visited, Survey).
